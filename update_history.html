<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="BUMP-Sorterのアップデート履歴です。">
    <title>アップデート履歴 | BUMP-Sorter</title>
    <link rel="stylesheet" href="./css/styles.css">
    <script defer src="./js/update-history.js"></script>
</head>

<body>
    <main class="update-history-page">
        <p class="back-link"><a href="index.html">← BUMP-Sorterに戻る</a></p>
        <header class="update-history-header">
            <h1>アップデート履歴</h1>
            <p>新しい更新から順に掲載しています。</p>
        </header>

        <p id="update-history-status" class="status-message" role="status" aria-live="polite">
            更新履歴を読み込んでいます。
        </p>
        <div id="update-history-list" class="update-history-list"></div>

        <noscript>
            <p class="status-message error">更新履歴の表示にはJavaScriptが必要です。</p>
        </noscript>
    </main>
</body>

</html>
